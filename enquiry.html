<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry | Green Planet Initiative</title>
    <meta name="description" content="Submit your enquiry about our eco-friendly products, services, volunteering, or sponsorship opportunities.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>🌍 Green Planet</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="enquiry.html" class="active">Enquiry</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Enquiry Form</h1>
        <p>Fill in the form below to enquire about our services, products, or to become a volunteer or sponsor.</p>

        <form id="enquiryForm" novalidate>
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required minlength="2" maxlength="50">
                <small class="error-message" id="nameError"></small>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
                <small class="error-message" id="emailError"></small>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="0821234567" pattern="[0-9]{10}">
                <small class="error-message" id="phoneError"></small>
            </div>

            <div class="form-group">
                <label for="enquiryType">Enquiry Type *</label>
                <select id="enquiryType" name="enquiry_type" required>
                    <option value="">Select an option</option>
                    <option value="service">Service Enquiry</option>
                    <option value="product">Product Enquiry</option>
                    <option value="volunteer">Volunteer Opportunity</option>
                    <option value="sponsor">Sponsorship</option>
                </select>
                <small class="error-message" id="enquiryTypeError"></small>
            </div>

            <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell us about your enquiry..." required minlength="10" maxlength="500"></textarea>
                <small class="error-message" id="messageError"></small>
                <small id="charCount">0/500 characters</small>
            </div>

            <button type="submit" class="submit-btn">Submit Enquiry</button>
        </form>

        <div id="responseMessage" style="display: none;"></div>
    </main>

    <footer>
        <p>&copy; 2026 Green Planet Initiative</p>
    </footer>

    <script src="js/form-validation.js"></script>
</body>
</html>
